services:
  - type: web
    name: zoom-clone-api
    env: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        value: sqlite:///./zoom_clone.db
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DEFAULT_USER_FULL_NAME
        value: Demo User
      - key: DEFAULT_USER_USERNAME
        value: demo
      - key: DEFAULT_USER_EMAIL
        value: demo@zoom.dev
      - key: DEFAULT_USER_PASSWORD
        value: Demo1234
